<div ng-controller="authorDetailCtrl">
  <table>
    <tr>
      <th>ID</th>
      <th>First name</th>
      <th>Last name</th>
      <th>Action</th>
    </tr>
    <tr>
      <td>{{author.id}}</td>
      <td>{{author.firstName}}</td>
      <td>{{author.lastName}}</td>
      <td><button ng-click="authorDelete(author.id)">Delete</button></td>
    </tr>
  </table>
</div>
